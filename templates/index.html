<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rental Portal</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{

            height:100vh;
            overflow:hidden;
        }

        .hero{

            width:100%;
            height:100vh;

            background:
            linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
            url('https://tse4.mm.bing.net/th/id/OIP.T9EXKIY3SJVKF5zhfG5cowHaFj?pid=Api&P=0&h=180');

            background-size:cover;
            background-position:center;

            position:relative;

            color:white;
        }

        .navbar{

            width:100%;
            padding:25px 60px;

            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{

            font-size:32px;
            font-weight:bold;
        }

        .nav-buttons{

            display:flex;
            gap:20px;
        }

        .nav-buttons a{

            text-decoration:none;
            color:white;
            padding:10px 20px;
            border-radius:8px;
            transition:0.3s;
        }

        .login-btn{

            border:1px solid white;
        }

        .start-btn{

            background:#7c3aed;
        }

        .start-btn:hover{

            background:#6d28d9;
        }

        .content{

            position:absolute;
            top:50%;
            left:10%;

            transform:translateY(-50%);
        }

        .content h1{

            font-size:72px;
            width:700px;
            line-height:1.1;
        }

        .content p{

            margin-top:20px;
            font-size:20px;
            width:600px;
            line-height:1.5;
        }

        .content button{

            margin-top:35px;

            padding:15px 35px;

            border:none;

            background:#7c3aed;

            color:white;

            font-size:18px;

            border-radius:10px;

            cursor:pointer;
        }

        .content button:hover{

            background:#6d28d9;
        }

    </style>

</head>

<body>

    <div class="hero">

        <div class="navbar">

            <div class="logo">
                RentalPortal
            </div>

            <div class="nav-buttons">

                <a href="/login" class="login-btn">
                    Log In
                </a>

                <a href="/register" class="start-btn">
                    Get Started
                </a>

            </div>

        </div>

        <div class="content">

            <h1>
                Manage rentals and tenants digitally
            </h1>

            <p>
                Simplify rental agreements, payments, maintenance requests,
                and tenant onboarding with one secure platform.
            </p>

            <button onclick="window.location.href='/register'">

                Get Started

            </button>

        </div>

    </div>

</body>

</html>
