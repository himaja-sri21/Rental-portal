<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rental Portal</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
        }

        .hero{

            width:100%;
            height:100vh;

            background:
            linear-gradient(rgba(0,0,0,0.55),
            rgba(0,0,0,0.55)),
            url('https://images.unsplash.com/photo-1560518883-ce09059eeffa?auto=format&fit=crop&w=1600&q=80');

            background-size:cover;
            background-position:center;

            position:relative;

            color:white;
        }

        /* NAVBAR */

        .navbar{

            width:100%;
            padding:25px 60px;

            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{

            font-size:34px;
            font-weight:bold;
        }

        .nav-buttons{

            display:flex;
            gap:15px;
        }

        .nav-buttons a{

            text-decoration:none;
            color:white;
            padding:12px 22px;
            border-radius:10px;
            transition:0.3s;
        }

        .login-btn{

            border:1px solid white;
        }

        .login-btn:hover{

            background:white;
            color:black;
        }

        .start-btn{

            background:#7c3aed;
        }

        .start-btn:hover{

            background:#6d28d9;
        }

        /* HERO CONTENT */

        .content{

            position:absolute;

            top:50%;
            left:8%;

            transform:translateY(-50%);
        }

        .content h1{

            font-size:70px;

            max-width:750px;

            line-height:1.1;
        }

        .content p{

            margin-top:20px;

            font-size:20px;

            max-width:700px;

            line-height:1.6;

            color:#e5e5e5;
        }

        /* SEARCH BAR */

        .search-box{

            margin-top:35px;

            width:900px;

            display:flex;

            background:white;

            border-radius:15px;

            overflow:hidden;

            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .search-box select{

            width:180px;

            border:none;

            outline:none;

            padding:18px;

            font-size:16px;
        }

        .search-box input{

            flex:1;

            border:none;

            outline:none;

            padding:18px;

            font-size:16px;
        }

        .search-btn{

            width:180px;

            border:none;

            background:#ef4444;

            color:white;

            font-size:18px;

            cursor:pointer;

            transition:0.3s;
        }

        .search-btn:hover{

            background:#dc2626;
        }

        /* GET STARTED BUTTON */

        .main-btn{

            margin-top:30px;

            padding:15px 35px;

            border:none;

            background:#7c3aed;

            color:white;

            font-size:18px;

            border-radius:10px;

            cursor:pointer;

            transition:0.3s;
        }

        .main-btn:hover{

            background:#6d28d9;
        }

        @media(max-width:1000px){

            .content h1{
                font-size:50px;
            }

            .search-box{
                width:100%;
                flex-direction:column;
            }

            .search-box select,
            .search-box input,
            .search-btn{
                width:100%;
            }
        }

    </style>

</head>

<body>

    <div class="hero">

        <div class="navbar">

            <div class="logo">
                🏠 RentalPortal
            </div>

            <div class="nav-buttons">

                <a href="/login" class="login-btn">
                    Log In
                </a>

                <a href="/register" class="start-btn">
                    Register
                </a>

            </div>

        </div>

        <div class="content">

            <h1>
                Find and Manage Rental Properties Easily
            </h1>

            <p>
                Search properties, manage tenants, track payments,
                handle maintenance requests and simplify rental
                management from one secure platform.
            </p>

            <button
                class="main-btn"
                onclick="window.location.href='/register'">

                Get Started

            </button>

        </div>

    </div>

</body>

</html>
