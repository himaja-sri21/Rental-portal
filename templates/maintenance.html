{% extends "base_dashboard.html" %}

{% block content %}

<div class="topbar">
    <div>
        <h1>🔧 Maintenance Requests</h1>
        <p>Track and manage maintenance issues</p>
    </div>
</div>

<div class="cards">

{% for maintenance in maintenances %}

<div class="card">
    <h2>Request #{{ maintenance.id }}</h2>

    <p><strong>Issue:</strong> {{ maintenance.issue }}</p>

    <div class="growth">
        Status: {{ maintenance.status }}
    </div>
</div>

{% endfor %}

</div>

{% endblock %}
