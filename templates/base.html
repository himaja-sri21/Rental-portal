<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f5f7fb;
        }

        /* Navbar */

        .navbar{
            height:70px;
            background:white;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:0 50px;
            box-shadow:0 2px 15px rgba(0,0,0,0.08);
            position:sticky;
            top:0;
            z-index:1000;
        }

        .logo{
            font-size:24px;
            font-weight:700;
            color:#2563eb;
        }

        .nav-links a{
            text-decoration:none;
            margin-left:25px;
            color:#333;
            font-weight:500;
            transition:0.3s;
        }

        .nav-links a:hover{
            color:#2563eb;
        }

        /* Layout */

        .container{
            display:flex;
        }

        /* Sidebar */

        .sidebar{
            width:250px;
            min-height:100vh;
            background:#1e293b;
            padding-top:30px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px 25px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#2563eb;
        }

        /* Content */

        .content{
            flex:1;
            padding:30px;
        }

        /* Cards */

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
        }

        .card h2{
            color:#2563eb;
            margin-bottom:10px;
        }

    </style>

</head>
<body>

    <div class="navbar">

        <div class="logo">
            🏠 Rental Portal
        </div>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/login">Login</a>
            <a href="/register">Register</a>
        </div>

    </div>

    <div class="container">

        <div class="sidebar">

            <a href="/dashboard">Dashboard</a>

            <a href="/properties-page">Properties</a>

            <a href="/tenants-page">Tenants</a>

            <a href="/landlords-page">Landlords</a>

            <a href="/payments-page">Payments</a>

            <a href="/maintenance-page">Maintenance</a>

        </div>

        <div class="content">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</body>
</html>
