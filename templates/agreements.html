{% extends "base_dashboard.html" %}

{% block content %}

<div class="topbar">
    <div>
        <h1>📄 Rental Agreements</h1>
        <p>Manage active rental agreements</p>
    </div>
</div>

<div class="cards">

{% for agreement in agreements %}

<div class="card">

    <h2>Agreement #{{ agreement.id }}</h2>

    <p>
        Start Date: {{ agreement.start_date }}
    </p>

    <p>
        End Date: {{ agreement.end_date }}
    </p>

</div>

{% endfor %}

</div>

{% endblock %}
