<!DOCTYPE html>
<html>
<head>
    <title>Register - Rental Portal</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(rgba(0,0,0,0.4),
            rgba(0,0,0,0.4)),
            url('https://images.unsplash.com/photo-1560518883-ce09059eeffa?q=80&w=1600');

            background-size:cover;
            background-position:center;
            padding:20px;
        }

        .register-box{
            width:450px;
            padding:40px;

            backdrop-filter:blur(15px);

            background:rgba(255,255,255,0.15);

            border:1px solid rgba(255,255,255,0.2);

            border-radius:20px;

            box-shadow:0 8px 32px rgba(0,0,0,0.3);

            color:white;
        }

        .logo{
            text-align:center;
            font-size:45px;
            margin-bottom:10px;
        }

        h2{
            text-align:center;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            margin-bottom:25px;
            color:#eee;
            font-size:14px;
        }

        .input-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-size:14px;
        }

        input, select{
            width:100%;
            padding:12px;

            border:none;
            outline:none;

            border-radius:10px;

            background:rgba(255,255,255,0.2);

            color:white;
        }

        input::placeholder{
            color:#ddd;
        }

        select option{
            color:black;
        }

        button{
            width:100%;
            padding:13px;

            border:none;

            border-radius:10px;

            background:#ff9800;

            color:white;

            font-size:16px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{
            background:#e68900;
        }

        .login-link{
            text-align:center;
            margin-top:18px;
        }

        .login-link a{
            color:#ffd54f;
            text-decoration:none;
            font-weight:bold;
        }

        .login-link a:hover{
            text-decoration:underline;
        }

    </style>
</head>

<body>

<div class="register-box">

    <div class="logo">🏠</div>

    <h2>Create Account</h2>

    <div class="subtitle">
        Register to manage tenants, properties and payments
    </div>

    <form action="/register" method="POST">

        <div class="input-group">
            <label>Full Name</label>
            <input type="text"
                   name="name"
                   placeholder="Enter Full Name"
                   required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email"
                   name="email"
                   placeholder="Enter Email"
                   required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password"
                   name="password"
                   placeholder="Create Password"
                   required>
        </div>

        <div class="input-group">
            <label>Role</label>
            <select name="role" required>
                <option value="">Select Role</option>
                <option value="landlord">Landlord</option>
                <option value="tenant">Tenant</option>
            </select>
        </div>

        <button type="submit">
            Create Account
        </button>

    </form>

    <div class="login-link">
        Already have an account?
        <a href="/login">
            Login
        </a>
    </div>

</div>

</body>
</html>
