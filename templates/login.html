<!DOCTYPE html>
<html>
<head>
    <title>Login - Rental Portal</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(rgba(0,0,0,0.4),
            rgba(0,0,0,0.4)),
            url('https://images.unsplash.com/photo-1560518883-ce09059eeffa?q=80&w=1600');

            background-size:cover;
            background-position:center;
        }

        .login-box{
            width:400px;
            padding:40px;

            backdrop-filter:blur(15px);

            background:rgba(255,255,255,0.15);

            border:1px solid rgba(255,255,255,0.2);

            border-radius:20px;

            box-shadow:0 8px 32px rgba(0,0,0,0.3);

            color:white;
        }

        .logo{
            text-align:center;
            margin-bottom:10px;
            font-size:45px;
        }

        h2{
            text-align:center;
            margin-bottom:25px;
        }

        .input-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-size:14px;
        }

        input{
            width:100%;
            padding:12px;

            border:none;
            outline:none;

            border-radius:10px;

            background:rgba(255,255,255,0.2);

            color:white;
        }

        input::placeholder{
            color:#ddd;
        }

        button{
            width:100%;
            padding:13px;

            border:none;

            border-radius:10px;

            background:#ff9800;

            color:white;

            font-size:16px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{
            background:#e68900;
        }

        .register{
            text-align:center;
            margin-top:18px;
        }

        .register a{
            color:#ffd54f;
            text-decoration:none;
            font-weight:bold;
        }

        .register a:hover{
            text-decoration:underline;
        }

        .subtitle{
            text-align:center;
            margin-bottom:25px;
            color:#eee;
            font-size:14px;
        }

    </style>
</head>

<body>

<div class="login-box">

    <div class="logo">🏠</div>

    <h2>Rental Portal</h2>

    <div class="subtitle">
        Sign in to manage properties, tenants and payments
    </div>

    <form action="/login" method="POST">

        <div class="input-group">
            <label>Email</label>
            <input type="email"
                   name="email"
                   placeholder="Enter Email"
                   required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password"
                   name="password"
                   placeholder="Enter Password"
                   required>
        </div>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="register">
        Don't have an account?
        <a href="/register">
            Register
        </a>
    </div>

</div>

</body>
</html>
