{% extends "base_dashboard.html" %}

{% block content %}

<div class="topbar">
    <div>
        <h1>👤 Tenants</h1>
        <p>Manage tenant information and records</p>
    </div>
</div>

<div class="cards">

{% for tenant in tenants %}

<div class="card">

```
<h2>{{ tenant.name }}</h2>

<p>
    Tenant ID: {{ tenant.id }}
</p>

<p>
    Email: {{ tenant.email }}
</p>

<div class="growth">
    Role: {{ tenant.role }}
</div>
```

</div>

{% endfor %}

</div>

{% endblock %}
