<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Tenants</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#f4f7f5;
            padding:40px;
        }

        h1{
            margin-bottom:30px;
            color:#2e7d32;
        }

        table{

            width:100%;

            border-collapse:collapse;

            background:white;

            border-radius:15px;

            overflow:hidden;

            box-shadow:0 4px 10px rgba(0,0,0,0.05);
        }

        th{

            background:#2e7d32;

            color:white;

            padding:15px;

            text-align:left;
        }

        td{

            padding:15px;

            border-bottom:1px solid #ddd;
        }

        tr:hover{

            background:#f1f1f1;
        }

        .back-btn{

            display:inline-block;

            margin-bottom:20px;

            text-decoration:none;

            background:#2e7d32;

            color:white;

            padding:10px 20px;

            border-radius:8px;
        }

    </style>

</head>

<body>

    <a href="/dashboard" class="back-btn">
        Back to Dashboard
    </a>

    <h1>
        Tenant Information
    </h1>

    <table>

        <tr>

            <th>ID</th>

            <th>Name</th>

            <th>Email</th>

            <th>Role</th>

        </tr>

        {% for tenant in tenants %}

        <tr>

            <td>{{ tenant.id }}</td>

            <td>{{ tenant.name }}</td>

            <td>{{ tenant.email }}</td>

            <td>{{ tenant.role }}</td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
