{% extends "base_dashboard.html" %}

{% block content %}

<div class="topbar">
    <div>
        <h1>🏠 Landlords</h1>
        <p>Property owner information</p>
    </div>
</div>

<div class="cards">

{% for landlord in landlords %}

<div class="card">

    <h2>{{ landlord.name }}</h2>

    <p>
        ID: {{ landlord.id }}
    </p>

    <div class="growth">
        {{ landlord.email }}
    </div>

</div>

{% endfor %}

</div>

{% endblock %}
